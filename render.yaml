services:
  - type: web
    name: solosprint-trade
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: RSA_PRIVATE_KEY
        sync: false

      - key: RSA_PUBLIC_KEY
        sync: false

      - key: ADMIN_EMAIL
        value: sampath12082@gmail.com

      - key: ADMIN_PASSWORD
        sync: false

      - key: MAIL_USERNAME
        sync: false

      - key: MAIL_PASSWORD
        sync: false

      - key: CORS_ALLOWED_ORIGINS
        value: https://solosprint-trade.onrender.com

      - key: SPRING_PROFILES_ACTIVE
        value: prod

      - key: GROWW_API_ENABLED
        value: "false"

      - key: ANTHROPIC_API_KEY
        sync: false

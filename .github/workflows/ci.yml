name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: myportfolio
          POSTGRES_USER: sampat
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sampat"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Backend compile
        working-directory: backend
        run: ./mvnw compile -q

      - name: Backend unit tests
        working-directory: backend
        env:
          DB_PASSWORD: testpassword
          DB_USER: sampat
          DB_HOST: localhost
        run: ./mvnw test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: myportfolio
          POSTGRES_USER: sampat
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U sampat"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Start backend
        working-directory: backend
        env:
          DB_PASSWORD: testpassword
          DB_USER: sampat
          DB_HOST: localhost
        run: |
          ./mvnw spring-boot:run -q &
          for i in $(seq 1 30); do
            curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/api/auth/public-key | grep -q 200 && break
            sleep 3
          done

      - name: Setup admin user
        run: |
          curl -s -X POST http://localhost:8081/api/auth/setup-admin \
            -H "Content-Type: application/json" \
            -d '{"email":"sampath12082@gmail.com","password":"Admin@1234567890*","firstName":"Test","lastName":"Admin"}'

      - name: Install Playwright
        working-directory: e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test --reporter=line

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/test-results/
          retention-days: 7

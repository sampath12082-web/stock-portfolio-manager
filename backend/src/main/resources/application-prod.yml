spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      data-source-properties:
        prepareThreshold: 0

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${PORT:8081}
  compression:
    enabled: true
    mime-types: application/json,text/html,text/css,application/javascript
    min-response-size: 1024

logging:
  level:
    root: WARN
    com.stocks.myportfolio: INFO
    org.flywaydb: INFO

jwt:
  secret: ${JWT_SECRET:bXlwb3J0Zm9saW8tc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjAyNg==}
  expiration: 900000
  refresh-expiration: 604800000

admin:
  default-password: ${ADMIN_DEFAULT_PASSWORD:Admin@1234567890*}

groww:
  api:
    base-url: https://api.groww.in
    access-token: ${GROWW_ACCESS_TOKEN:}
    api-secret: ${GROWW_API_SECRET:}
    enabled: ${GROWW_API_ENABLED:false}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://stock-portfolio-manager-4rht.onrender.com}

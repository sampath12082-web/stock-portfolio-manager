spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:myportfolio}
    username: ${DB_USER:sampat}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
  
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8081

jwt:
  secret: ${JWT_SECRET:bXlwb3J0Zm9saW8tc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24tMjAyNg==}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

admin:
  default-password: ${ADMIN_DEFAULT_PASSWORD:Admin@1234567890*}

groww:
  api:
    base-url: https://api.groww.in
    access-token: ${GROWW_ACCESS_TOKEN:}
    api-secret: ${GROWW_API_SECRET:}
    api-version: "1.0"
    enabled: ${GROWW_API_ENABLED:false}